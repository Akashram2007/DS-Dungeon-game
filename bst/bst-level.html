<h1 class="title">BST Repair Chamber</h1>
<div class="hint-box">
  <p><b>🎯 Goal:</b> Repair the Binary Search Tree</p>
  <p><b>📏 Rules:</b></p>
  <ul>
    <li>Values smaller than parent go to the <b>LEFT</b></li>
    <li>Values larger than parent go to the <b>RIGHT</b></li>
    <li>BST rule applies to the <b>entire subtree</b></li>
    <li>Place all missing nodes correctly</li>
  </ul>
</div>

<div id="numbers" class="numbers"></div>

<p id="msg"></p>
