<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Data Structure Dungeon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div class="bg">

    <div class="stack">
      <div></div><div></div><div></div><div></div>
    </div>

    <div class="queue">
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="tree">
      <div class="node root">50</div>
      <div class="children">
        <div class="node">30</div>
        <div class="node">70</div>
      </div>
    </div>
  </div>

  <div class="screen" id="startScreen">
    <h1 class="title">DATA STRUCTURE <br> DUNGEON</h1>
    <p class="tagline">Escape using logic, not code.</p>

    <button id="startBtn">START</button>
    <p class="hint">⏱ Time & score based</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
