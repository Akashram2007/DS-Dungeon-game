<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stack Transfer Chamber</title>
  <link rel="stylesheet" href="stack.css">
</head>
<body>

<h1>Stack Transfer Chamber</h1><br>
<div class="hint-box">
  <p><b>🎯 Goal:</b> Arrange blocks in correct order in <b>Stack 3</b></p>
  <p><b>📏 Rules:</b></p>
  <ul>
    <li>Drag ONLY from the <b>TOP</b></li>
    <li>Drop ONLY on the <b>TOP</b></li>
    <li>Use <b>Stack 2</b> as helper</li>
    <li>LIFO matters!</li>
  </ul>
</div>
<div class="game">
  <div class="stack" data-id="0"></div>
  <div class="stack" data-id="1"></div>
  <div class="stack" data-id="2"></div>
</div>

<p id="msg"></p>

<script src="stack.js"></script>
</body>
</html>
